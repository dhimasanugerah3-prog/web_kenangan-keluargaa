<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Family Gallery</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="splash-screen">
        <h1 data-aos="fade-in" data-aos-duration="1500"><i class="fas fa-images me-3"></i>Digital Family Gallery</h1>
        <p>Created by DIMAS ANUGRAH</p>
        <div class="progress-bar-custom"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="login-container" class="container d-flex justify-content-center align-items-center min-vh-100 hidden">
        <div class="glass-card text-center col-10 col-md-5">
            <h3 class="mb-4">Masuk ke Galeri Keluarga</h3>
            <form id="login-form">
                <input type="text" id="login-name" class="form-control my-3 bg-transparent text-white" placeholder="Nickname Keluarga (cth: Ayah)" required>
                <input type="text" id="login-phone" class="form-control my-3 bg-transparent text-white" placeholder="Nomor Telepon" required>
                <input type="password" id="login-pass" class="form-control my-3 bg-transparent text-white" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100 mt-2">Kirim Kode Akses</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="container py-5 hidden">
        <header class="d-flex justify-content-between align-items-center mb-5 glass-card">
            <div>
                <h4 id="greeting-text">Selamat Datang</h4>
                <small id="digital-clock"></small>
            </div>
            <div class="d-flex align-items-center">
                <button id="theme-toggle" class="btn btn-sm btn-outline-light me-3"><i class="fas fa-moon"></i></button>
                <button id="logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="glass-card text-center">
                    <h5><i class="fas fa-camera text-primary me-2"></i> Foto</h5>
                    <h2 id="stat-photos">0</h2>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="glass-card text-center">
                    <h5><i class="fas fa-video text-success me-2"></i> Video</h5>
                    <h2 id="stat-videos">0</h2>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="glass-card text-center">
                    <h5><i class="fas fa-cloud text-info me-2"></i> Cuaca Saat Ini</h5>
                    <h3 id="weather-info">Memuat...</h3>
                </div>
            </div>
        </div>

        <div class="glass-card my-4 text-center p-5" id="drop-zone">
            <div class="mb-3"><i class="fas fa-motorcycle fa-4x text-indigo"></i></div>
            <h4>Drag & Drop Foto / Video Keluarga di Sini</h4>
            <input type="file" id="file-input" multiple class="hidden">
            <button class="btn btn-outline-primary mt-3" onclick="document.getElementById('file-input').click()">Pilih File</button>
        </div>

        <h4 class="my-4">Album & Dokumentasi Terbaru</h4>
        <div class="row" id="gallery-grid"></div>

        <footer class="text-center mt-5 py-3 border-top border-secondary">
            <p>© 2026 Digital Family Gallery • Developed with ❤️ by <strong>DIMAS ANUGRAH</strong></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="/js/app.js"></script>
    <script>AOS.init();</script>
</body>
</html>
